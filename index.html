<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>callit-o — Minimalist HD Communication</title>
  <meta name="description" content="Professional HD video and voice calls.">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- Socket.IO & WebRTC -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══ AUTH SCREEN ═══════════════════════════════════ -->
  <div id="authScreen" class="screen active">
    <div class="auth-wrap">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span>callit-o</span>
      </div>
      <h1 class="auth-title">High Definition<br>Communication.</h1>
      <p class="auth-sub">Secure, crystal clear video and voice calls. Simple and minimalist.</p>
      <button id="btnGoogleLogin" class="btn-google">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- ══ MAIN APP SCREEN ═══════════════════════════════ -->
  <div id="appScreen" class="screen">
    
    <header class="app-header">
      <h2 id="headerTitle">Calls</h2>
      <div class="header-actions">
        <button class="theme-toggle" id="btnThemeToggle" title="Toggle Theme">
          <svg id="sunIcon" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="theme-toggle" id="btnHeaderAction">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </header>

    <main class="content-area">
      <!-- Search (Visible on Contacts Tab) -->
      <div id="searchContainer" class="search-container hidden">
        <div class="search-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="contactSearch" placeholder="Search Call ID...">
        </div>
      </div>

      <div id="tabCalls" class="tab-pane active">
        <div id="callLogList"></div>
      </div>

      <div id="tabContacts" class="tab-pane">
        <div id="contactsList"></div>
      </div>

      <div id="tabProfile" class="tab-pane">
        <div class="profile-wrap">
          <img id="profileAvatar" class="p-avatar" src="" alt="">
          <h3 id="profileName" class="p-name">—</h3>
          <p id="profileEmail" style="color:var(--tx-sub); font-size:14px">—</p>
          
          <div class="p-id-box">
            <span class="p-id" id="profileUID">loading…</span>
            <button id="btnCopyUID" style="color:var(--tx-sub)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>

          <button id="btnSignOut" class="btn-primary" style="margin-top: 40px; background: var(--surface-sub); color: var(--tx); width: auto; padding: 12px 32px;">Sign Out</button>
        </div>
      </div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="calls">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <span>Calls</span>
      </button>
      <button class="nav-btn" data-tab="contacts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>People</span>
      </button>
      <button class="nav-btn" data-tab="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Settings</span>
      </button>
    </nav>
  </div>

  <!-- ══ MODALS ═════════════════════════════════════════ -->
  <div id="modalAddContact" class="modal-ov hidden">
    <div class="modal-box">
      <h3 class="modal-title">New Contact</h3>
      <p class="modal-sub">Search for a friend by their short Call ID.</p>
      <div class="search-input-wrap" style="margin-bottom: 20px;">
        <input type="text" id="addContactUID" placeholder="Enter Call ID (e.g. john_doe)">
        <button id="btnSearchUID" style="font-weight: 700;">Search</button>
      </div>
      
      <div id="addContactResult" class="item-row hidden">
        <img id="addContactPhoto" class="avatar" src="" alt="">
        <div class="item-info">
          <div id="addContactName" class="item-name">—</div>
          <div id="addContactUID2" class="item-meta">—</div>
        </div>
        <button id="btnConfirmAdd" class="btn-circle" style="background:var(--success); color:#fff;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </div>
      
      <p id="addContactError" class="modal-error hidden" style="color:var(--danger); font-size:13px; text-align:center;">User not found.</p>
      <button class="btn-primary" style="background:var(--surface-sub); color:var(--tx); margin-top:20px" onclick="hideModal('modalAddContact')">Cancel</button>
    </div>
  </div>

  <!-- ══ CALL SCREEN ════════════════════════════════════ -->
  <div id="callScreen" class="screen call-screen">
    <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
    <video id="localVideo" class="local-video" autoplay playsinline muted></video>

    <div class="call-ui">
      <div class="peer-info">
        <h2 id="callBarName" class="peer-name">—</h2>
        <span id="callBarStatus" class="call-status">Connecting…</span>
      </div>

      <div class="call-controls">
        <button class="control-btn" id="btnToggleMic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
        </button>
        <button class="control-btn" id="btnToggleCam">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        </button>
        <button class="control-btn hangup" id="btnEndCall">
          <svg viewBox="0 0 24 24" fill="currentColor" style="transform: rotate(135deg)"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.11-.21c1.21.48 2.53.75 3.88.75a1 1 0 011 1V20a1 1 0 01-1 1C8.61 21 3 15.39 3 8.5a1 1 0 011-1h3.5a1 1 0 011 1c0 1.36.27 2.67.75 3.88a1 1 0 01-.23 1.11l-2.4 2.4z"/></svg>
        </button>
        <button class="control-btn" id="btnFlipCam">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ══ INCOMING CALL ══════════════════════════════════ -->
  <div id="incomingScreen" class="modal-ov hidden" style="background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);">
    <div class="auth-wrap" style="color:#fff">
      <img id="incomingPhoto" class="p-avatar" style="width:120px; height:120px; border:none" src="" alt="">
      <h2 id="incomingName" class="p-name">—</h2>
      <p id="incomingType" style="opacity:0.6; margin-bottom:60px">Incoming Call</p>
      
      <div class="call-controls">
        <button class="control-btn hangup" id="btnRejectCall">
          <svg viewBox="0 0 24 24" fill="currentColor" style="transform: rotate(135deg)"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.11-.21c1.21.48 2.53.75 3.88.75a1 1 0 011 1V20a1 1 0 01-1 1C8.61 21 3 15.39 3 8.5a1 1 0 011-1h3.5a1 1 0 011 1c0 1.36.27 2.67.75 3.88a1 1 0 01-.23 1.11l-2.4 2.4z"/></svg>
        </button>
        <button class="control-btn" id="btnAcceptCall" style="background:var(--success); border:none">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.11-.21c1.21.48 2.53.75 3.88.75a1 1 0 011 1V20a1 1 0 01-1 1C8.61 21 3 15.39 3 8.5a1 1 0 011-1h3.5a1 1 0 011 1c0 1.36.27 2.67.75 3.88a1 1 0 01-.23 1.11l-2.4 2.4z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
